<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quotes — Lunde Staff</title>
    <link rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="./v6.css">
    <link rel="stylesheet" href="./console.css">
    <style>
      /* staff quote builder */
      .qb-form { display: grid; gap: 14px; }
      .qb-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .qb-field { display: grid; gap: 6px; }
      .qb-field > span { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
      .qb-field input, .qb-field select, .qb-field textarea { height: 42px; border: 1px solid var(--line-2); border-radius: var(--radius); padding: 0 12px; font: inherit; background: var(--panel); outline: none; width: 100%; }
      .qb-field textarea { height: auto; min-height: 70px; padding: 10px 12px; resize: vertical; }
      .qb-field input:focus, .qb-field select:focus, .qb-field textarea:focus { border-color: var(--ink); }
      .qb-line { display: grid; grid-template-columns: 1fr 120px auto auto; gap: 12px; align-items: end; }
      .qb-line .calc { font-size: 12.5px; color: var(--muted); white-space: nowrap; padding-bottom: 12px; min-width: 150px; }
      .qb-line .rm { background: none; border: 0; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer; padding: 0 0 12px; }
      .qb-line .rm:hover { color: var(--sale); }
      .qb-total { display: flex; justify-content: space-between; align-items: baseline; border-top: 1px solid var(--line); padding-top: 14px; font-weight: 700; }
      @media (max-width: 720px) { .qb-grid2 { grid-template-columns: 1fr; } .qb-line { grid-template-columns: 1fr 90px; } .qb-line .calc { grid-column: 1 / -1; padding: 0; } }
    </style>
  </head>
  <body data-staff="quotes">
    <main>
      <div class="app-head"><div><p class="eyebrow">Pipeline</p><h1>Quotes</h1></div><button class="btn" type="button" id="qbToggle">New quote</button></div>
      <div class="panel" id="qbPanel" hidden style="margin-bottom:clamp(22px,2.6vw,34px)">
        <div class="panel-head"><h2>New quote</h2></div>
        <div class="panel-pad qb-form" id="qbBody"></div>
      </div>
      <div class="kpis" id="quoteKpis"></div>
      <div id="quotesList"></div>
    </main>
    <script defer src="./data.js"></script>
    <script defer src="./store.js"></script>
    <script defer src="./app-shell.js"></script>
    <script defer src="./quotes.js"></script>
  </body>
</html>
