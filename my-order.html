<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order — Lunde Flooring Co.</title>
    <meta name="description" content="View the status and details for a Lunde Flooring order.">
    <link rel="icon" href="./favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./v6.css">
      <meta name="robots" content="noindex, follow">
    <style>
      /* Clean receipt when printing: strip chrome and interactive bits, keep
         order id, items, totals, payment, and delivery details. */
      .mo-print-head { display: none; }
      @media print {
        header, footer, .v6-topbar, .v6-tabbar, .mo-back, .mo-actions, .mo-banner, .mo-stepper { display: none !important; }
        body { background: #fff; }
        .mo-layout { display: block; }
        .mo-info { margin-top: 18px; }
        .mo-print-head { display: block; margin-bottom: 18px; border-bottom: 1px solid #ccc; padding-bottom: 12px; }
        .mo-print-head b { font-size: 18px; }
        .mo-print-head p { margin: 4px 0 0; font-size: 12px; color: #555; }
        a { text-decoration: none; color: inherit; }
      }
    </style>
  </head>
  <body data-nav="account">
    <main>
      <div class="v6-page" id="moPage"></div>
    </main>
    <script defer src="./chrome.js"></script>
    <script defer src="./data.js"></script>
    <script defer src="./store.js"></script>
    <script defer src="./my-order.js"></script>
  </body>
</html>
