<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Customer — Lunde Staff</title>
    <link rel="icon" href="./favicon.ico">
    <link rel="stylesheet" href="./v6.css">
    <link rel="stylesheet" href="./console.css">
    <style>
      /* customer profile — forms, address cards, favorite tiles */
      .cp-form { display: grid; gap: 14px; }
      .cp-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      .cp-field { display: grid; gap: 6px; }
      .cp-field > span { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
      .cp-field input, .cp-field select, .cp-field textarea { height: 42px; border: 1px solid var(--line-2); border-radius: var(--radius); padding: 0 12px; font: inherit; background: var(--panel); outline: none; width: 100%; }
      .cp-field textarea { height: auto; min-height: 92px; padding: 10px 12px; resize: vertical; }
      .cp-field input:focus, .cp-field select:focus, .cp-field textarea:focus { border-color: var(--ink); }
      .cp-check { display: flex; gap: 10px; align-items: center; font-size: 14px; cursor: pointer; }
      .cp-check input { width: 16px; height: 16px; accent-color: var(--accent); }
      .cp-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .cp-saved { font-size: 12.5px; color: var(--sage); font-weight: 600; }
      .cp-addr-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
      .cp-addr { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); padding: 16px 18px; display: grid; gap: 4px; align-content: start; }
      .cp-addr h4 { font-size: 14px; display: flex; gap: 8px; align-items: center; }
      .cp-addr .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent); padding: 2px 7px; border-radius: 999px; }
      .cp-addr p { margin: 0; font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }
      .cp-addr-actions { display: flex; gap: 14px; margin-top: 8px; }
      .cp-addr-actions button { background: none; border: 0; padding: 0; font: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer; }
      .cp-addr-actions button:hover { color: var(--ink); }
      .cp-addr-actions button.danger:hover { color: var(--sale); }
      .cp-fav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
      .cp-fav { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); overflow: hidden; color: inherit; }
      .cp-fav:hover .nm { color: var(--accent); }
      .cp-fav .im { display: block; aspect-ratio: 1 / 1; background-size: cover; background-position: center; background-color: var(--paper-2); }
      .cp-fav .bd { padding: 10px 12px; display: grid; gap: 2px; }
      .cp-fav .nm { font-size: 13.5px; font-weight: 600; line-height: 1.3; }
      .cp-fav .pr { font-size: 12.5px; color: var(--muted); }
      @media (max-width: 720px) { .cp-grid2, .cp-addr-grid, .cp-fav-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-staff="customers">
    <main><div id="cpMount"></div></main>
    <script defer src="./data.js"></script>
    <script defer src="./store.js"></script>
    <script defer src="./app-shell.js"></script>
    <script defer src="./address-autocomplete.js"></script>
    <script defer src="./customer-profile.js"></script>
  </body>
</html>
