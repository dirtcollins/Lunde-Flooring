<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script>if(location.pathname.indexOf('/admin/')===0)document.write('<base href="/">');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Sign In — Lunde Flooring Co.</title>
    <link rel="icon" href="./favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./v6.css">
    <link rel="stylesheet" href="./interior.css">
      <meta name="robots" content="noindex, follow">
  </head>
  <body>
    <header class="auth-top">
      <div class="auth-top-inner">
        <a class="v6-brand" href="./index.html" aria-label="Lunde Flooring Co."><span class="bw"><span>L</span><span>U</span><span>N</span><span>D</span><span>E</span></span><small>Flooring Co.</small></a>
        <a class="auth-top-back" href="./index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 12H5M11 6l-6 6 6 6"></path></svg>
          Back to store
        </a>
      </div>
    </header>
    <main>
      <div class="auth">
        <div class="auth-media">
          <img src="./media/lifestyle/living-room-sectional-oak.webp" srcset="./media/lifestyle/living-room-sectional-oak-800.webp 800w, ./media/lifestyle/living-room-sectional-oak-1400.webp 1400w, ./media/lifestyle/living-room-sectional-oak.webp 1920w" sizes="(max-width: 860px) 100vw, 52vw" alt="Bright living room with wide-plank oak luxury vinyl flooring">
          <div class="auth-media-copy">
            <p class="eyebrow">Admin console</p>
            <p class="auth-media-quote">Full control of the Lunde storefront and operations.</p>
            <div class="auth-media-perks">
              <span><svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 19v-6M13 19V9M18 19v-9"></path></svg>Reports</span>
              <span><svg viewBox="0 0 24 24"><path d="M4 7h16v13H4zM4 11h16"></path></svg>Inventory</span>
              <span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>Settings</span>
            </div>
          </div>
        </div>
        <div class="auth-panel">
          <div class="auth-card">
            <span class="eyebrow">Admin console</span>
            <h1 class="display">Sign in.</h1>
            <p class="sub">Access orders, inventory, customers, and quotes.</p>
            <form class="v6-form" id="loginForm">
              <label class="v6-field"><span>Email</span><input name="email" type="email" autocomplete="username" required placeholder="you@lundeflooring.com"></label>
              <label class="v6-field"><span>Password</span><input name="password" type="password" autocomplete="current-password" required placeholder="••••••••"></label>
              <p class="v6-promo-msg" id="loginStatus" role="status" aria-live="polite"></p>
              <button class="btn lg" type="submit" id="loginSubmit">Sign in</button>
            </form>
            <div class="auth-alt"><a href="./admin/reset">Forgot password?</a></div>
            <div class="auth-reassure">
              <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="1"></rect><path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg>
              <span>Authorized administrators only. Sessions are verified securely on the server.</span>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script defer src="./data.js"></script>
    <script defer src="./store.js"></script>
    <script defer src="./login.js"></script>
  </body>
</html>
