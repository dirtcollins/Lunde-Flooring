<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <script>if(location.pathname.indexOf('/account/')===0)document.write('<base href="/">');</script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Email — Lunde Flooring Co.</title>
    <meta name="description" content="Verify your Lunde Flooring account email address to activate customer login and order history.">
    <link rel="icon" href="./favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./v6.css">
    <link rel="stylesheet" href="./interior.css">
      <meta name="robots" content="noindex, follow">
  </head>
  <body>
    <header class="auth-top">
      <div class="auth-top-inner">
        <a class="v6-brand" href="./index.html" aria-label="Lunde Flooring Co."><span class="bw"><span>L</span><span>U</span><span>N</span><span>D</span><span>E</span></span><small>Flooring Co.</small></a>
        <a class="auth-top-back" href="./account/login">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 12H5M11 6l-6 6 6 6"></path></svg>
          Back to sign in
        </a>
      </div>
    </header>
    <main>
      <div class="auth">
        <div class="auth-media">
          <img src="./media/lifestyle/open-plan-dining-vinyl-plank.webp" srcset="./media/lifestyle/open-plan-dining-vinyl-plank-800.webp 800w, ./media/lifestyle/open-plan-dining-vinyl-plank.webp 1214w" sizes="(max-width: 860px) 100vw, 52vw" alt="Open-plan dining room with light oak luxury vinyl plank flooring">
          <div class="auth-media-copy">
            <p class="eyebrow">My account</p>
            <p class="auth-media-quote">One quick step and your account is ready.</p>
            <div class="auth-media-perks">
              <span><svg viewBox="0 0 24 24"><path d="M4 7h16v13H4z"></path><path d="M4 7l8 6 8-6"></path></svg>Confirm your email</span>
              <span><svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-10"></path></svg>Activate ordering</span>
            </div>
          </div>
        </div>
        <div class="auth-panel">
          <div class="auth-card">
            <span class="eyebrow">My account</span>
            <h1 class="display">Verify your email.</h1>
            <p class="sub" id="verifyIntro">Checking your verification link…</p>
            <p class="v6-promo-msg" id="verifyStatus" role="status" aria-live="polite"></p>
            <form class="v6-form" id="resendForm" hidden>
              <label class="v6-field"><span>Email</span><input name="email" type="email" autocomplete="email" required placeholder="you@email.com"></label>
              <button class="btn lg" type="submit" id="resendSubmit">Send new link</button>
            </form>
            <div class="auth-alt"><a href="./account/login">Back to sign in</a></div>
          </div>
        </div>
      </div>
    </main>
    <script defer src="./data.js"></script>
    <script defer src="./store.js"></script>
    <script defer src="./account-verify.js"></script>
  </body>
</html>
